config:
    validation: true
    warningsAsErrors: false

comments:
    UndocumentedPublicClass:
        active: true
        excludes: ['**/commonTest/**', '**/androidTest/**', '**/iosTest/**']
    UndocumentedPublicFunction:
        active: true
        excludes: ['**/commonTest/**', '**/androidTest/**', '**/iosTest/**']
    UndocumentedPublicProperty:
        active: true
        excludes: ['**/commonTest/**', '**/androidTest/**', '**/iosTest/**']
    OutdatedDocumentation:
        active: true
        excludes: ['**/commonTest/**', '**/androidTest/**', '**/iosTest/**']

naming:
    FunctionNaming:
        ignoreAnnotated:
            - 'Composable'
            - 'Preview'

style:
    ForbiddenComment:
        active: false
    MagicNumber:
        active: false
