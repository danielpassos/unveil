<!--
  Canvas: 680 × 280, center = (340, 140)

  Content block:
    - wordmark: 52px, baseline needs +36px from top of text box → text y = center_y - 18 + 36 = center_y + 18
    - tagline: 16px gap below wordmark baseline → y = wordmark_y + 34
    - total block height ≈ 52 + 16 + 13 = 81px
    - block top = 140 - 81/2 = 99.5 → wordmark baseline at 99.5 + 52 = 151.5 ≈ 152
    - tagline baseline at 152 + 34 = 186

  Brackets:
    - wordmark "UNVEIL" at 52px weight-300 ≈ 195px + 5×12px spacing = 255px wide
    - centered at 340 → left edge = 340 - 127 = 213, right edge = 340 + 127 = 467
    - bracket outer x: left = 213 - 18 = 195, right = 467 + 18 = 485
    - bracket top y: wordmark cap-height ≈ 38px above baseline → top = 152 - 38 = 114, with 8px padding → 106
    - bracket bottom y: descender ≈ 8px below baseline → 152 + 8 = 160, with 8px padding → 168
-->

